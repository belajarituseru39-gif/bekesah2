<!DOCTYPE html>
<html lang="id">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEKESAH - Media Pembelajaran IFP</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scrollbar muncul */
        }
        body {
            font-family: 'Fredoka', sans-serif;
            background-image: url('https://i.imgur.com/6VLckn4.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            user-select: none;
        }
        #root {
            height: 100%;
            width: 100%;
        }
        .bg-overlay {
            background-color: rgba(255, 255, 255, 0.5);
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .text-shadow {
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        .text-shadow-dark {
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
        }
        .logo-blend {
            mix-blend-mode: multiply;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
            border: 2px solid #f1f1f1;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* Animations */
        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .animate-bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>

        const { Star, Clock, Users, Trophy, RotateCcw, MessageCircle, Play, CheckCircle, XCircle, ArrowRight, HelpCircle, BookOpen, X, RefreshCw, Info, Home, Maximize, Minimize, Volume2, VolumeX, Zap, List } = Icons;

        // --- DATA KARTU ---
        const CARDS_DATA = [
            // A. Bangun Pagi
            { id: 'A1', topic: 'Bangun Pagi', color: 'kuning', max: 10, min: 3, question: 'Pukul berapa biasanya kamu bangun pagi? Berapa lama waktu yang kamu butuhkan untuk bersiap-siap pergi ke sekolah?' },

        // --- KONFIGURASI PAPAN PEMAIN ---

                { topic: 'Beribadah', targetColor: 'pink' },

        // --- HELPER FUNCTIONS ---
        const getColorClass = (colorName) => {
            switch(colorName) {
                case 'kuning': return 'bg-yellow-300 border-yellow-500 text-yellow-900';
                case 'hijau': return 'bg-green-300 border-green-500 text-green-900';
                case 'biru': return 'bg-blue-300 border-blue-500 text-blue-900';
                case 'merah': return 'bg-red-300 border-red-500 text-red-900';
                case 'pink': return 'bg-pink-300 border-pink-500 text-pink-900';
                case 'ungu': return 'bg-purple-300 border-purple-500 text-purple-900';
                default: return 'bg-gray-200 border-gray-400';
            }
        };

        const getSlotColorClass = (colorName) => {
             switch(colorName) {
                case 'kuning': return 'bg-yellow-200 border-yellow-400 text-yellow-800';
                case 'hijau': return 'bg-green-200 border-green-400 text-green-800';
                case 'biru': return 'bg-blue-200 border-blue-400 text-blue-800';
                case 'merah': return 'bg-red-200 border-red-400 text-red-800';
                case 'pink': return 'bg-pink-200 border-pink-400 text-pink-800';
                case 'ungu': return 'bg-purple-200 border-purple-400 text-purple-800';
                default: return 'bg-gray-100 border-gray-300';
            }
        };

        const getTopicImage = (topic) => {
            if (topic.includes('Bangun')) return 'https://i.imgur.com/X0S9pt4.png';
            if (topic.includes('Beribadah')) return 'https://i.imgur.com/x1XPJfA.png';
            if (topic.includes('Berolahraga')) return 'https://i.imgur.com/dV5oGqu.png';
            if (topic.includes('Makan')) return 'https://i.imgur.com/7deMgna.png';
            if (topic.includes('Belajar')) return 'https://i.imgur.com/ELuX7Cu.png';
            if (topic.includes('Bermasyarakat')) return 'https://i.imgur.com/mWohqZ3.png';
            if (topic.includes('Tidur')) return 'https://i.imgur.com/Gvmm2wP.png';
            return null;
        }

        const calculatePoints = (card, targetSlot) => {
            if (!card || !targetSlot) return 0;
            return (card.color === targetSlot.targetColor) ? card.max : card.min;
        };

        // --- COMPONENTS ---

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col animate-bounce-in">
                        <div className="p-6 border-b flex justify-between items-center bg-blue-50 rounded-t-3xl">
                            <h2 className="text-2xl font-bold text-blue-800 flex items-center gap-3">
                                <BookOpen className="w-6 h-6"/> {title}
                            </h2>

        const App = () => {
            const [gameState, setGameState] = useState('intro'); 
            const [numPlayers, setNumPlayers] = useState(2);
            const [players, setPlayers] = useState([]);
            const [playerNames, setPlayerNames] = useState({});
            const [deck, setDeck] = useState([]);
            const [discardPile, setDiscardPile] = useState([]);
            const [turn, setTurn] = useState(0);
            const [drawnCard, setDrawnCard] = useState(null);
            const [timer, setTimer] = useState(300);
            const [winner, setWinner] = useState(null);
            const [discussionCard, setDiscussionCard] = useState(null);
            const [showGuide, setShowGuide] = useState(false);
            const [showProgress, setShowProgress] = useState(false);
            
            // Turn Notification State
            const [showTurnNotification, setShowTurnNotification] = useState(false);
            const [nextPlayerName, setNextPlayerName] = useState("");

            // Audio State
            const [isMusicPlaying, setIsMusicPlaying] = useState(false);
            const audioRef = useRef(new Audio("https://github.com/belajarituseru39-gif/bekesah/raw/refs/heads/main/Bincang%20Numerasi%20Asyik.mp3"));
            audioRef.current.loop = true;

            useEffect(() => {
                let interval;
                // Only pause timer for turn notification if there's more than 1 player
                const isPaused = numPlayers > 1 && showTurnNotification;
                
                if (gameState === 'playing' && !isPaused && timer > 0) {
                    interval = setInterval(() => {
                        setTimer((prev) => prev - 1);
                    }, 1000);
                } else if (timer === 0 && gameState === 'playing') {
                    endGame();

                return () => clearInterval(interval);
            }, [gameState, timer, showTurnNotification, numPlayers]);

            const toggleMusic = () => {

                    audioRef.current.pause();

                setIsMusicPlaying(!isMusicPlaying);

            const toggleFullscreen = () => {

            const startMusicAndGame = () => {
                if (!isMusicPlaying) {

                setGameState('setup');
            };

            const handleNameChange = (index, value) => {
                setPlayerNames(prev => ({
                    ...prev,
                    [index]: value
                }));
            };

            const shuffleDeck = (array) => {
                let currentIndex = array.length, randomIndex;
                while (currentIndex != 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
                return array;
            };

            const startGame = () => {
                const newPlayers = Array.from({ length: numPlayers }, (_, i) => ({
                    id: i,
                    name: playerNames[i] || `Pemain ${i + 1}`,
                    boardConfig: PLAYER_BOARDS_CONFIG[i],
                    collectedCards: {}, 
                    score: 0
                }));
                
                const newDeck = shuffleDeck([...CARDS_DATA]);
                
                setPlayers(newPlayers);
                setDeck(newDeck);
                setDiscardPile([]);
                setTurn(0);
                setTimer(300);
                setGameState('playing');
                setDrawnCard(null);
                
                // Show notification only if multiple players
                if (numPlayers > 1) {
                    setShowTurnNotification(true);
                    setNextPlayerName(newPlayers[0].name);
                } else {
                    setShowTurnNotification(false);
                }
            };

            const drawFromDeck = () => {
                if (deck.length === 0) {
                    if (discardPile.length > 0) {
                        const newDeck = shuffleDeck([...discardPile]);
                        const card = newDeck.pop();
                        
                        setDeck(newDeck);
                        setDiscardPile([]);
                        setDrawnCard(card);
                    } else {
                        return; 
                    }
                } else {
                    const newDeck = [...deck];
                    const card = newDeck.pop();
                    setDeck(newDeck);
                    setDrawnCard(card);
                }
            };

            const drawFromDiscard = () => {
                if (discardPile.length === 0) return;
                const newDiscard = [...discardPile];
                const card = newDiscard.pop();
                setDiscardPile(newDiscard);
                setDrawnCard(card);
            };

            const handleKeepCard = () => {
                if (!drawnCard) return;

                const currentPlayer = players[turn];
                const targetSlot = currentPlayer.boardConfig.find(slot => slot.topic === drawnCard.topic);

                if (targetSlot) {
                    const oldCard = currentPlayer.collectedCards[drawnCard.topic];
                    
                    if (oldCard) {
                        setDiscardPile(prev => [...prev, oldCard]);
                    }

                    let points = calculatePoints(drawnCard, targetSlot);

                    let scoreChange = points;
                    if (oldCard) {
                        scoreChange -= oldCard.pointsEarned;
                    }

                    const updatedPlayers = [...players];
                    updatedPlayers[turn] = {
                        ...currentPlayer,
                        collectedCards: {
                            ...currentPlayer.collectedCards,
                            [drawnCard.topic]: { ...drawnCard, pointsEarned: points }
                        },
                        score: currentPlayer.score + scoreChange
                    };

                    setPlayers(updatedPlayers);
                    setDrawnCard(null);
                    
                    const filledSlots = Object.keys(updatedPlayers[turn].collectedCards).length;
                    if (filledSlots === currentPlayer.boardConfig.length) {
                        endGame(updatedPlayers);
                    } else {
                        nextTurn();
                    }
                }
            };

            const handleDiscardCard = () => {
                if (!drawnCard) return;
                setDiscardPile(prev => [...prev, drawnCard]);
                setDrawnCard(null);
                nextTurn();
            };

            const nextTurn = () => {
                const nextIndex = (turn + 1) % numPlayers;
                const nextName = players[nextIndex].name;
                
                setTurn(nextIndex);
                
                if (numPlayers > 1) {
                    setNextPlayerName(nextName);
                    setShowTurnNotification(true);
                }
            };

            const closeTurnNotification = () => {
                setShowTurnNotification(false);
            };

            const endGame = (currentPlayersState = players) => {
                setGameState('ended');
                const sortedPlayers = [...currentPlayersState].sort((a, b) => b.score - a.score);
                setWinner(sortedPlayers[0]);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const startDiscussion = (card) => {
                setDiscussionCard(card);
                setGameState('discussion');

            const ControlButtons = () => (

                            <div className="animate-float mb-2">

                                </div>
                            </div>

                            <p className="text-base font-bold tracking-wide text-gray-700 mb-2 font-fredoka">Bincang Numerasi Asyik Dan Ramah</p>
                            
                            <p className="text-xs text-gray-600 mb-3 max-w-sm leading-relaxed">
                                adalah media pembelajaran berbasis permainan yang dapat membantu guru untuk memulai kegiatan Bincang Numerasi secara rutin di kelas dengan tema 7 Kebiasaan Anak Indonesia Hebat.
                            </p>

                            <div className="bg-white/60 rounded-lg p-2 border border-gray-200 mb-4 w-full shadow-inner text-[10px]">
                                <h3 className="font-bold text-indigo-700 text-sm mb-0.5">Ide Permainan</h3>
                                <p className="font-bold text-gray-800">oleh Abdul Rahmat, S.Pd</p>
                                <p className="text-gray-600">SDN 011 Balikpapan Tengah</p>

                            </div>

                            <button

                                <Play size={20} fill="currentColor"/>
                                MASUK KE PERMAINAN

                        <Modal isOpen={showGuide} onClose={() => setShowGuide(false)} title="Aturan Permainan BEKESAH">

                                    <h3 className="text-sm font-bold text-indigo-700 mb-1 flex items-center gap-1.5 bg-indigo-50 p-1.5 rounded-lg">
                                        <Trophy size={14} className="text-indigo-500"/> 1. Tujuan Permainan

                                        <Star size={14} className="text-indigo-500"/> 3. Sistem Poin

                                    <div className="grid grid-cols-2 gap-3 mt-2">

                                            <span className="text-[10px] text-gray-500 leading-tight">Jika Topik & Warna kartu <strong>SAMA PERSIS</strong> dengan papan.</span>

                                        </div>

                                </section>
                            </div>

                                            />

                                    onClick={() => setShowGuide(true)}

                                >

                            </button>
                        </div>

                        <Modal isOpen={showGuide} onClose={() => setShowGuide(false)} title="Aturan Permainan BEKESAH">
                            <div className="space-y-4 text-xs">
                                <section>
                                    <h3 className="text-sm font-bold text-indigo-700 mb-1 flex items-center gap-1.5 bg-indigo-50 p-1.5 rounded-lg">
                                        <Trophy size={14} className="text-indigo-500"/> 1. Tujuan Permainan
                                    </h3>
                                    <p className="text-gray-600 pl-2">Kumpulkan semua kartu yang <strong>SESUAI</strong> dengan topik di papan permainanmu secepat mungkin sebelum waktu habis!</p>
                                </section>

                                <section>
                                    <h3 className="text-sm font-bold text-indigo-700 mb-1 flex items-center gap-1.5 bg-indigo-50 p-1.5 rounded-lg">
                                        <Play size={14} className="text-indigo-500"/> 2. Cara Bermain
                                    </h3>
                                    <ul className="list-disc pl-5 space-y-1 text-gray-600">
                                        <li>Ambil kartu dari <strong>Tumpukan Tertutup</strong> atau <strong>Kartu Terbuka</strong>.</li>
                                        <li>Cocokkan topik kartu dengan slot kosong di papanmu.</li>
                                        <li>
                                            <span className="font-bold text-green-600">COCOK</span> = Simpan kartu. <br/>
                                            <span className="font-bold text-red-500">TIDAK COCOK</span> = Buang ke tumpukan terbuka.
                                        </li>
                                        <li>Kamu bisa <strong>MENUKAR</strong> kartu yang sudah ada jika menemukan kartu baru dengan poin lebih tinggi.</li>
                                    </ul>
                                </section>

                                <section>
                                    <h3 className="text-sm font-bold text-indigo-700 mb-1 flex items-center gap-1.5 bg-indigo-50 p-1.5 rounded-lg">
                                        <Star size={14} className="text-indigo-500"/> 3. Sistem Poin
                                    </h3>
                                    <div className="grid grid-cols-2 gap-3 mt-2">
                                        <div className="bg-green-50 p-2 rounded-lg border border-green-200 text-center">
                                            <strong className="block text-green-700 text-sm mb-0.5">⭐ 10 Poin</strong>
                                            <span className="text-[10px] text-gray-500 leading-tight">Jika Topik & Warna kartu <strong>SAMA PERSIS</strong> dengan papan.</span>
                                        </div>
                                        <div className="bg-yellow-50 p-2 rounded-lg border border-yellow-200 text-center">
                                            <strong className="block text-yellow-700 text-sm mb-0.5">⭐ 3-6 Poin</strong>
                                            <span className="text-[10px] text-gray-500 leading-tight">Jika Topik <strong>SAMA</strong> tapi Warna <strong>BERBEDA</strong>.</span>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </Modal>
                    </div>
                );
            }

            if (gameState === 'playing') {
                const currentPlayer = players[turn];
                const canKeep = drawnCard && currentPlayer.boardConfig.some(slot => slot.topic === drawnCard.topic);
                const matchedSlot = drawnCard ? currentPlayer.boardConfig.find(s => s.topic === drawnCard.topic) : null;
                const isPerfectMatch = matchedSlot && matchedSlot.targetColor === drawnCard.color;
                const existingCard = matchedSlot ? currentPlayer.collectedCards[matchedSlot.topic] : null;
                const potentialPoints = matchedSlot ? calculatePoints(drawnCard, matchedSlot) : 0;
                const pointDiff = existingCard ? potentialPoints - existingCard.pointsEarned : 0;

                return (
                    <div className="h-screen flex flex-col overflow-hidden font-fredoka">
                        <ControlButtons />

                        {/* Player Progress Sidebar */}
                        <PlayerProgressOverlay 
                            players={players} 
                            currentPlayerId={currentPlayer.id} 
                            isOpen={showProgress} 
                            onClose={() => setShowProgress(false)} 
                        />
                        
                        {/* Turn Notification Overlay */}
                        {showTurnNotification && (
                            <TurnOverlay playerName={nextPlayerName} onReady={closeTurnNotification} />
                        )}
                        
                        {/* Persistent Score Overlay (Top Left) */}
                        <div className="fixed top-2 left-2 z-40 bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg shadow-md border border-indigo-200 flex flex-col items-start animate-bounce-in">
                            <div className="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Pemain Aktif</div>
                            <div className="text-sm font-black text-indigo-700">{currentPlayer.name}</div>
                            <div className="flex items-center gap-0.5 text-yellow-600 font-bold mt-0.5 text-[10px]">
                                <Star size={10} fill="currentColor" />
                                <span>{currentPlayer.score} Poin</span>
                            </div>
                        </div>

                        {/* Header Fixed */}
                        <div className="bg-white/90 backdrop-blur shadow-sm p-1.5 px-3 flex justify-center items-center z-20 shrink-0 border-b border-gray-200 h-10">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-1.5 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">
                                    <Clock size={16} className="text-indigo-600" />
                                    <span className="text-base font-bold font-mono text-indigo-900">{formatTime(timer)}</span>
                                </div>
                                
                                <div className="flex flex-col items-center">
                                    <div className="text-[8px] font-bold text-gray-500 tracking-widest uppercase">Giliran Pemain</div>
                                    <h2 className="text-lg font-black text-indigo-700 leading-none text-shadow-dark">{currentPlayer.name}</h2>
                                </div>

                                <button onClick={() => endGame()} className="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1 rounded-md font-bold text-xs transition-colors border border-red-200 shadow-sm">
                                    Akhiri
                                </button>
                            </div>
                        </div>

                        {/* Main Game Area */}
                        <div className="flex-1 flex flex-col items-center justify-center relative p-2 w-full">
                            
                            {/* Deck Area - Compact */}
                            <div className="flex gap-4 items-center mb-3 scale-90 bg-white/40 p-3 rounded-2xl backdrop-blur-sm border border-white/50 shadow-lg">
                                {/* Deck Tertutup */}
                                <div className="text-center group">
                                    <div className="mb-0.5 font-bold text-gray-800 text-[8px] tracking-wider uppercase group-hover:text-indigo-700 transition-colors bg-white/60 px-1.5 py-0.5 rounded">Ambil Disini</div>
                                    <Card isFaceDown={true} onClick={!drawnCard ? drawFromDeck : null} />
                                    <div className="mt-0.5 text-[8px] font-bold text-gray-800 bg-white/60 px-1.5 py-0.5 rounded inline-block">{deck.length} Kartu</div>
                                </div>

                                {/* Kartu Terbuka */}
                                <div className="text-center group">
                                    <div className="mb-0.5 font-bold text-gray-800 text-[8px] tracking-wider uppercase group-hover:text-indigo-700 transition-colors bg-white/60 px-1.5 py-0.5 rounded">Atau Disini</div>
                                    {discardPile.length > 0 ? (
                                        <Card card={discardPile[discardPile.length - 1]} onClick={!drawnCard ? drawFromDiscard : null} />
                                    ) : (
                                        <div className="w-20 h-32 md:w-24 md:h-40 border-2 border-dashed border-gray-400 bg-white/30 rounded-lg flex items-center justify-center text-gray-600 font-bold text-[10px]">
                                            Kosong
                                        </div>
                                    )}
                                    <div className="mt-0.5 text-[8px] font-bold text-gray-800 bg-white/60 px-1.5 py-0.5 rounded inline-block">Tumpukan Buangan</div>
                                </div>
                            </div>

                            {/* Modal/Overlay Saat Kartu Diambil */}
                            {drawnCard && (
                                <div className="absolute inset-0 z-30 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                                    <div className={`bg-white p-4 rounded-3xl shadow-xl flex flex-col items-center animate-bounce-in w-full border-2 border-white ${existingCard ? 'max-w-2xl' : 'max-w-sm'}`}>
                                        <h3 className="text-xl font-black text-gray-800 mb-3">
                                            {existingCard ? "BANDINGKAN KARTU" : "KARTU DIAMBIL"}
                                        </h3>
                                        
                                        <div className="flex flex-col md:flex-row gap-4 items-center justify-center w-full mb-4">
                                            
                                            {/* Logic Tampilan jika ada kartu kembar (Swap Scenario) */}
                                            {existingCard ? (
                                                <div className="flex gap-4 w-full justify-center">
                                                    {/* Kartu Lama */}
                                                    <div className="flex flex-col items-center gap-1 opacity-75">
                                                        <span className="font-bold text-xs text-gray-500 uppercase tracking-widest">Kartu Lama</span>
                                                        <div className="scale-90">
                                                            <Card card={existingCard} />
                                                        </div>
                                                        <div className="bg-gray-100 px-2 py-1 rounded text-xs font-bold text-gray-600 border border-gray-200">
                                                            Poin: {existingCard.pointsEarned}
                                                        </div>
                                                    </div>

                                                    {/* Indikator VS */}
                                                    <div className="flex flex-col justify-center items-center">
                                                        <div className="font-black text-gray-300 text-lg">VS</div>
                                                    </div>

                                                    {/* Kartu Baru */}
                                                    <div className="flex flex-col items-center gap-1">
                                                        <span className="font-bold text-xs text-indigo-600 uppercase tracking-widest">Kartu Baru</span>
                                                        <div className="scale-100 ring-4 ring-indigo-200 rounded-lg">
                                                            <Card card={drawnCard} />
                                                        </div>
                                                        <div className={`px-2 py-1 rounded text-xs font-bold border flex items-center gap-1 ${potentialPoints >= existingCard.pointsEarned ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'}`}>
                                                            Poin: {potentialPoints} 
                                                            {pointDiff !== 0 && (
                                                                <span className={pointDiff > 0 ? "text-green-600" : "text-red-600"}>
                                                                    ({pointDiff > 0 ? '+' : ''}{pointDiff})
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                /* Tampilan Normal (Single Card) */
                                                <div className="scale-100 transform origin-center mx-auto">
                                                    <Card card={drawnCard} />
                                                </div>
                                            )}
                                            
                                            {/* Panel Info & Aksi */}
                                            <div className="flex-1 flex flex-col gap-2 w-full max-w-xs">
                                                {canKeep ? (
                                                    <div className={`p-2 rounded-lg border-2 ${isPerfectMatch ? 'bg-green-100 border-green-400 text-green-900' : 'bg-yellow-100 border-yellow-400 text-yellow-900'}`}>
                                                        <div className="flex items-center gap-1.5 mb-0.5">
                                                            {isPerfectMatch ? <Star className="fill-current" size={16}/> : <CheckCircle size={16}/>}
                                                            <span className="font-bold text-sm">COCOK!</span>
                                                        </div>
                                                        <p className="leading-tight text-[10px] mb-1">
                                                            {isPerfectMatch 
                                                                ? "Warna & Topik Sama! Poin Maksimal." 
                                                                : "Topik Sama, Warna Beda. Poin Minimal."}
                                                        </p>
                                                        {existingCard && (
                                                            <div className="bg-white/50 p-1.5 rounded-md text-[8px] font-semibold flex items-center gap-1">
                                                                <RefreshCw size={10}/>
                                                                Slot ini sudah terisi. Mau tukar?
                                                            </div>
                                                        )}
                                                    </div>
                                                ) : (
                                                    <div className="bg-red-100 p-2 rounded-lg border-2 border-red-300 text-red-900">
                                                        <div className="flex items-center gap-1.5 mb-0.5">
                                                            <XCircle size={16}/>
                                                            <span className="font-bold text-sm">TIDAK COCOK</span>
                                                        </div>
                                                        <p className="leading-tight text-[10px]">Kartu ini tidak cocok dengan topik di papanmu.</p>
                                                    </div>
                                                )}
                                                
                                                <div className="grid grid-cols-2 gap-1.5 mt-0.5">
                                                    <button 
                                                        onClick={handleDiscardCard}
                                                        className="bg-red-500 hover:bg-red-600 text-white py-2 rounded-md font-bold text-xs shadow-sm flex items-center justify-center gap-1 transition-transform active:scale-95"
                                                    >
                                                        <XCircle size={14}/> {existingCard ? "BUANG BARU" : "BUANG"}
                                                    </button>
                                                    {canKeep && (
                                                        <button 
                                                            onClick={handleKeepCard}
                                                            className={`text-white py-2 rounded-md font-bold text-xs shadow-sm flex items-center justify-center gap-1 transition-transform active:scale-95 ${existingCard ? 'bg-blue-500 hover:bg-blue-600' : 'bg-green-500 hover:bg-green-600'}`}
                                                        >
                                                            {existingCard ? <RefreshCw size={14}/> : <CheckCircle size={14}/>} 
                                                            {existingCard ? "TUKAR KARTU" : "SIMPAN"}
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Papan Pemain Aktif - Full Width for IFP */}
                            <div className="w-full bg-white/95 backdrop-blur rounded-t-[2rem] shadow-[0_-5px_20px_-10px_rgba(0,0,0,0.2)] p-3 pb-4 mt-auto mb-4 md:mb-8 z-10 border-t-2 border-indigo-200 flex flex-col">
                                <div className="flex justify-between items-center mb-2 px-3">
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-2 h-6 bg-indigo-500 rounded-full"></div>
                                        <div className="text-base font-bold text-gray-700">Papan Permainanmu</div>
                                    </div>
                                    <div className="bg-indigo-600 text-white px-3 py-0.5 rounded-full font-bold text-xs shadow-sm">
                                        Total Poin: {currentPlayer.score}
                                    </div>
                                </div>
                                <div className="flex flex-wrap justify-center gap-2 w-full">
                                    {currentPlayer.boardConfig.map((slot, idx) => (
                                        <Card 
                                            key={idx}
                                            isTarget={true}
                                            targetColor={slot.targetColor}
                                            topic={slot.topic}
                                            card={currentPlayer.collectedCards[slot.topic]}
                                            isSmall={currentPlayer.boardConfig.length > 6} 
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'ended') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <ControlButtons />
                         {/* White overlay for readability over background */}
                        <div className="absolute inset-0 bg-white/40 backdrop-blur-sm z-0"></div>
                        
                        <div className="bg-white p-6 rounded-[2rem] shadow-2xl text-center max-w-2xl w-full z-10 border-2 border-white animate-bounce-in">
                            <div className="mb-3 inline-block relative">
                                <Trophy size={48} className="text-yellow-500 drop-shadow-md" />
                                <Star className="absolute -top-1 -right-1 text-yellow-300 fill-current animate-ping" size={24} />
                            </div>
                            
                            <h1 className="text-3xl font-black text-gray-800 mb-1">PERMAINAN SELESAI!</h1>
                            <p className="text-xl text-gray-500 mb-6 font-light">Selamat kepada <span className="text-indigo-600 font-bold underline decoration-wavy">{winner.name}</span></p>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                                {players.map(p => (
                                    <div key={p.id} className={`relative p-3 rounded-xl border-2 transition-transform hover:scale-105 ${p.id === winner.id ? 'border-yellow-400 bg-yellow-50 shadow-lg scale-105 z-10' : 'border-gray-100 bg-gray-50'}`}>
                                        {p.id === winner.id && <div className="absolute -top-2 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-white text-[8px] font-bold px-2 py-0.5 rounded-full shadow-sm">JUARA</div>}
                                        <div className="font-bold text-base text-gray-600 mb-0.5">{p.name}</div>
                                        <div className="text-3xl font-black text-indigo-600">{p.score}</div>
                                        <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">Poin</div>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl p-4 mb-6 shadow-md text-white relative overflow-hidden group cursor-pointer transition-all hover:shadow-xl">
                                <div className="absolute top-0 right-0 p-4 opacity-10 transform rotate-12">
                                    <MessageCircle size={80} fill="currentColor"/>
                                </div>
                                
                                <h3 className="text-xl font-black mb-1 flex items-center justify-center gap-1.5">
                                    <MessageCircle size={24} /> BINCANG NUMERASI
                                </h3>
                                <p className="text-sm opacity-90 mb-3">Pemenang, silakan pilih satu kartu kebanggaanmu untuk kita bahas bersama!</p>
                                
                                <div className="flex flex-wrap justify-center gap-2 relative z-10">
                                    {Object.values(winner.collectedCards).length > 0 ? (
                                        Object.values(winner.collectedCards).map((card, idx) => (
                                            <div key={idx} onClick={() => startDiscussion(card)} className="hover:scale-110 transition-transform cursor-pointer ring-2 ring-transparent hover:ring-yellow-400 rounded-lg">
                                                <Card card={card} isSmall={true} />
                                            </div>
                                        ))
                                    ) : (
                                        <div className="bg-white/20 p-2 rounded-lg text-xs">
                                            <p>Pemenang tidak memiliki kartu. Silakan pilih kartu acak dari deck.</p>
                                            <button onClick={() => startDiscussion(deck[0] || CARDS_DATA[0])} className="mt-1 bg-yellow-400 text-yellow-900 px-3 py-1 rounded font-bold">Pilih Kartu Acak</button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button onClick={startGame} className="bg-gray-800 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-gray-900 flex items-center gap-1.5 mx-auto text-base shadow-lg transition-transform active:scale-95">
                                <RotateCcw size={16} /> Main Lagi
                            </button>
                            <button onClick={() => setGameState('intro')} className="mt-4 text-gray-400 hover:text-gray-600 font-bold text-[10px] flex items-center justify-center gap-0.5 mx-auto">
                                <ArrowRight className="rotate-180" size={10}/> Kembali ke Judul
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'discussion') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative">
                        <ControlButtons />
                         {/* White overlay for readability over background */}
                        <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-0"></div>

                        <div className="bg-white rounded-[2rem] shadow-2xl p-6 md:p-8 max-w-4xl w-full flex flex-col md:flex-row gap-8 items-center animate-bounce-in relative z-10 border-2 border-white">
                            
                            <div className="flex-shrink-0 transform rotate-[-3deg] z-10">
                                <div className="scale-95 drop-shadow-xl">
                                    <Card card={discussionCard} />
                                </div>
                            </div>
                            
                            <div className="flex-1 z-10">
                                <div className="flex items-center gap-2 mb-3">
                                    <span className="bg-indigo-100 text-indigo-800 px-2.5 py-0.5 rounded-full font-bold uppercase tracking-wider text-[10px] border border-indigo-200">
                                        Topik Diskusi
                                    </span>
                                    <h3 className="text-lg font-bold text-gray-500">{discussionCard.topic}</h3>
                                </div>
                                
                                <h2 className="text-2xl md:text-3xl font-black text-gray-800 leading-tight mb-6">
                                    "{discussionCard.question}"
                                </h2>

                                <div className="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500 shadow-inner">
                                    <h4 className="font-bold text-base text-indigo-800 mb-2 flex items-center gap-1.5">
                                        <Users size={16}/> Panduan Bincang Numerasi (Metode STAR):
                                    </h4>
                                    <ul className="space-y-2 text-sm text-gray-700">
                                        <li className="flex gap-2">
                                            <span className="bg-indigo-200 text-indigo-800 font-bold w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs">S-T</span>
                                            <span><strong>Stimulus & Tugas:</strong> Ajak murid memahami soal di kartu dan memikirkan jawabannya.</span>
                                        </li>
                                        <li className="flex gap-2">
                                            <span className="bg-indigo-200 text-indigo-800 font-bold w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs">A</span>
                                            <span><strong>Aksi:</strong> Diskusikan! Tanyakan: "Kenapa jawabannya begitu?", "Apa yang terjadi jika angkanya berbeda?", atau "Ada cara lain?".</span>
                                        </li>
                                        <li className="flex gap-2">
                                            <span className="bg-indigo-200 text-indigo-800 font-bold w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs">R</span>
                                            <span><strong>Respons:</strong> Simpulkan manfaat hitungan ini untuk kebiasaan sehari-hari kita.</span>
                                        </li>
                                    </ul>
                                </div>

                                <button 
                                    onClick={() => setGameState('intro')}
                                    className="mt-6 group text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-1.5 text-sm transition-colors"
                                >
                                    <Home className="group-hover:-translate-y-1 transition-transform" /> Kembali ke Halaman Utama
                                </button>
                            </div>
                        </div>
                    </div>
                )
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
